<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>菜谱管理</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>

<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;

        const resolveApiBaseUrl = () => {
            if (window.__API_BASE_URL) {
                return window.__API_BASE_URL.replace(/\/$/, '');
            }
            const isLocal = ['localhost', '127.0.0.1'].includes(window.location.hostname);
            return isLocal ? '/api' : 'https://menu-58i4.onrender.com/api';
        };

        const API_BASE_URL = resolveApiBaseUrl();

        const api = {
            get: async (path) => {
                const res = await fetch(`${API_BASE_URL}${path}`);
                return res.json();
            },
            post: async (path, data) => {
                const res = await fetch(`${API_BASE_URL}${path}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                return res.json();
            },
            put: async (path, data) => {
                const res = await fetch(`${API_BASE_URL}${path}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                return res.json();
            },
            delete: async (path) => {
                const res = await fetch(`${API_BASE_URL}${path}`, {
                    method: 'DELETE'
                });
                return res.json();
            },
            upload: async (path, formData) => {
                const res = await fetch(`${API_BASE_URL}${path}`, {
                    method: 'POST',
                    body: formData
                });
                return res.json();
            },
            uploadPut: async (path, formData) => {
                const res = await fetch(`${API_BASE_URL}${path}`, {
                    method: 'PUT',
                    body: formData
                });
                return res.json();
            }
        };

        const defaultConfig = {
            categories: ['家常菜', '快手菜', '甜点', '饮品'],
            flavors: ['清淡', '微辣', '中辣', '重辣', '酸甜', '咸鲜'],
            ingredients: [
                { name: '猪肉', icon: 'fa-drumstick-bite' },
                { name: '牛肉', icon: 'fa-cow' },
                { name: '鸡肉', icon: 'fa-drumstick-bite' },
                { name: '鱼肉', icon: 'fa-fish' },
                { name: '虾', icon: 'fa-shrimp' },
                { name: '青菜', icon: 'fa-leaf' },
                { name: '番茄', icon: 'fa-apple-whole' },
                { name: '土豆', icon: 'fa-carrot' },
                { name: '豆腐', icon: 'fa-cube' },
                { name: '鸡蛋', icon: 'fa-egg' }
            ],
            categoryIcons: {
                '家常菜': 'fa-home',
                '快手菜': 'fa-bolt',
                '甜点': 'fa-cake-candles',
                '饮品': 'fa-mug-hot'
            },
            flavorIcons: {
                '清淡': 'fa-leaf-green',
                '微辣': 'fa-pepper-hot',
                '中辣': 'fa-pepper-hot',
                '重辣': 'fa-fire',
                '酸甜': 'fa-lemon',
                '咸鲜': 'fa-utensils'
            },
            savePath: '',
            autoSave: true,
            customPrefix: ''
        };

        let config = JSON.parse(localStorage.getItem('recipeConfig')) || defaultConfig;
        let recipes = JSON.parse(localStorage.getItem('recipes')) || [];

        const getCategoryIcon = (category) => {
            const icon = config.categoryIcons?.[category] || 'fa-circle';
            if (icon.startsWith('custom:')) {
                return icon;
            }
            return icon;
        };
        const getFlavorIcon = (flavor) => {
            const icon = config.flavorIcons?.[flavor] || 'fa-circle';
            if (icon.startsWith('custom:')) {
                return icon;
            }
            return icon;
        };
        const getIngredientIcon = (ingredient) => {
            const icon = ingredient.icon || 'fa-circle';
            if (icon.startsWith('custom:')) {
                return icon;
            }
            return icon;
        };

        const renderIcon = (icon, className = '') => {
            if (icon && icon.startsWith('custom:')) {
                const imageUrl = icon.substring(7);
                return <img src={imageUrl} alt="icon" className={`w-4 h-4 object-contain ${className}`} />;
            }
            return <i className={`fas ${icon} ${className}`}></i>;
        };

        const App = () => {
            const [page, setPage] = useState('home');
            const [selectedRecipe, setSelectedRecipe] = useState(null);
            const [selectedCategory, setSelectedCategory] = useState('');
            const [selectedFlavor, setSelectedFlavor] = useState(null);
            const [selectedIngredient, setSelectedIngredient] = useState(null);
            const [showCategoryFilter, setShowCategoryFilter] = useState(false);
            const [showFlavorFilter, setShowFlavorFilter] = useState(false);
            const [showIngredientFilter, setShowIngredientFilter] = useState(false);
            const [searchQuery, setSearchQuery] = useState('');
            const [appConfig, setAppConfig] = useState({ categories: [], flavors: [], ingredients: [], categoryIcons: {}, flavorIcons: {} });
            const [filteredRecipes, setFilteredRecipes] = useState([]);
            const [recipes, setRecipes] = useState([]);
            const [loading, setLoading] = useState(true);
            const [editingRecipe, setEditingRecipe] = useState(null);
            const [currentUser, setCurrentUser] = useState(() => {
                const saved = localStorage.getItem('currentUser');
                return saved ? JSON.parse(saved) : null;
            });
            const [selectedDate, setSelectedDate] = useState(new Date().toISOString().split('T')[0]);
            const [menuToEdit, setMenuToEdit] = useState(null);
            const [showMealTypePicker, setShowMealTypePicker] = useState(false);
            const [selectedMealType, setSelectedMealType] = useState('lunch');
            const [recipeToAdd, setRecipeToAdd] = useState(null);
            const [favorites, setFavorites] = useState([]);
            const [favoriteIds, setFavoriteIds] = useState(new Set());

            useEffect(() => {
                loadData();
            }, []);

            useEffect(() => {
                if (currentUser) {
                    loadFavorites();
                }
            }, [currentUser]);

            const loadFavorites = async () => {
                if (!currentUser) return;
                try {
                    const res = await api.get(`/favorites/${currentUser.id}`);
                    if (res.success) {
                        setFavorites(res.data);
                        setFavoriteIds(new Set(res.data.map(f => f.id)));
                    }
                } catch (error) {
                    console.error('加载收藏失败:', error);
                }
            };

            const toggleFavorite = async (recipeId) => {
                if (!currentUser) {
                    setPage('login');
                    return;
                }
                try {
                    if (favoriteIds.has(recipeId)) {
                        const res = await api.delete(`/favorites/${currentUser.id}/${recipeId}`);
                        if (res.success) {
                            setFavorites(favorites.filter(f => f.id !== recipeId));
                            const newIds = new Set(favoriteIds);
                            newIds.delete(recipeId);
                            setFavoriteIds(newIds);
                        }
                    } else {
                        const res = await api.post(`/favorites/${currentUser.id}`, { recipeId });
                        if (res.success) {
                            const recipe = recipes.find(r => r.id === recipeId);
                            if (recipe) {
                                setFavorites([recipe, ...favorites]);
                            }
                            const newIds = new Set(favoriteIds);
                            newIds.add(recipeId);
                            setFavoriteIds(newIds);
                        }
                    }
                } catch (error) {
                    console.error('收藏操作失败:', error);
                }
            };

            const isFavorited = (recipeId) => {
                return favoriteIds.has(recipeId);
            };

            const loadData = async () => {
                try {
                    setLoading(true);
                    const [categoriesRes, flavorsRes, ingredientsRes, recipesRes] = await Promise.all([
                        api.get('/categories'),
                        api.get('/flavors'),
                        api.get('/ingredients'),
                        api.get('/recipes')
                    ]);

                    const categories = categoriesRes.success ? categoriesRes.data.map(c => c.name) : [];
                    const flavors = flavorsRes.success ? flavorsRes.data.map(f => f.name) : [];
                    const ingredients = ingredientsRes.success ? ingredientsRes.data : [];
                    const recipesData = recipesRes.success ? recipesRes.data : [];

                    const categoryIcons = {};
                    if (categoriesRes.success) {
                        categoriesRes.data.forEach(c => categoryIcons[c.name] = c.icon);
                    }
                    const flavorIcons = {};
                    if (flavorsRes.success) {
                        flavorsRes.data.forEach(f => flavorIcons[f.name] = f.icon);
                    }

                    setAppConfig({ categories, flavors, ingredients, categoryIcons, flavorIcons });
                    setRecipes(recipesData);
                    setSelectedCategory(categories[0] || '');
                } catch (error) {
                    console.error('加载数据失败:', error);
                } finally {
                    setLoading(false);
                }
            };

            const saveConfig = async (newConfig) => {
                setAppConfig(newConfig);
            };

            const saveRecipes = (newRecipes) => {
                setRecipes(newRecipes);
            };

            useEffect(() => {
                let filtered = [...recipes];
                if (selectedCategory) {
                    filtered = filtered.filter(r => r.category === selectedCategory);
                }
                if (selectedFlavor) {
                    filtered = filtered.filter(r => r.flavor === selectedFlavor);
                }
                if (selectedIngredient) {
                    filtered = filtered.filter(r => r.ingredients.some(i => i.name === selectedIngredient));
                }
                if (searchQuery.trim()) {
                    const query = searchQuery.toLowerCase();
                    filtered = filtered.filter(r =>
                        r.name.toLowerCase().includes(query) ||
                        r.category.toLowerCase().includes(query) ||
                        r.flavor.toLowerCase().includes(query) ||
                        r.ingredients.some(i => i.name.toLowerCase().includes(query))
                    );
                }
                setFilteredRecipes(filtered);
            }, [selectedCategory, selectedFlavor, selectedIngredient, searchQuery, recipes]);

            const handleAddToMenu = async () => {
                if (!recipeToAdd || !selectedMealType) return;
                try {
                    const today = new Date().toISOString().split('T')[0];
                    const typeLabel = { breakfast: '早餐', lunch: '午餐', dinner: '晚餐', midnight: '夜宵' };
                    const res = await api.post(`/menus/${currentUser.id}/menus`, {
                        menu_date: today,
                        meal_type: selectedMealType,
                        recipe_ids: [recipeToAdd.id]
                    });
                    if (res.success) {
                        alert(`已加入今日${typeLabel[selectedMealType]}菜单！`);
                    } else {
                        alert(res.message || '加入失败');
                    }
                } catch (error) {
                    console.error('加入菜单失败:', error);
                    alert('加入失败：' + error.message);
                }
                setShowMealTypePicker(false);
                setRecipeToAdd(null);
            };

            const exportConfig = () => {
                const data = JSON.stringify({ categories: appConfig.categories, flavors: appConfig.flavors, ingredients: appConfig.ingredients, categoryIcons: appConfig.categoryIcons, flavorIcons: appConfig.flavorIcons }, null, 2);
                const blob = new Blob([data], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'recipe-config.json';
                a.click();
                URL.revokeObjectURL(url);
            };

            const importConfig = async () => {
                const input = document.createElement('input');
                input.type = 'file';
                input.accept = '.json';
                input.onchange = async (e) => {
                    const file = e.target.files[0];
                    if (file) {
                        const reader = new FileReader();
                        reader.onload = async (event) => {
                            try {
                                const data = JSON.parse(event.target.result);
                                if (data.categories) {
                                    for (const cat of data.categories) {
                                        const icon = data.categoryIcons?.[cat] || 'fa-circle';
                                        await api.post('/categories', { name: cat, icon });
                                    }
                                }
                                if (data.flavors) {
                                    for (const flav of data.flavors) {
                                        const icon = data.flavorIcons?.[flav] || 'fa-circle';
                                        await api.post('/flavors', { name: flav, icon });
                                    }
                                }
                                if (data.ingredients) {
                                    for (const ing of data.ingredients) {
                                        await api.post('/ingredients', { name: ing.name || ing, icon: ing.icon || 'fa-circle' });
                                    }
                                }
                                alert('导入成功');
                                await loadData();
                            } catch (err) {
                                alert('导入失败：' + err.message);
                            }
                        };
                        reader.readAsText(file);
                    }
                };
                input.click();
            };

            const exportData = () => {
                const data = JSON.stringify(recipes, null, 2);
                const blob = new Blob([data], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'recipes.json';
                a.click();
                URL.revokeObjectURL(url);
            };

            const importData = async () => {
                const input = document.createElement('input');
                input.type = 'file';
                input.accept = '.json';
                input.onchange = async (e) => {
                    const file = e.target.files[0];
                    if (file) {
                        const reader = new FileReader();
                        reader.onload = async (event) => {
                            try {
                                const data = JSON.parse(event.target.result);
                                for (const recipe of data) {
                                    await api.post('/recipes', recipe);
                                }
                                alert('导入成功');
                                await loadData();
                            } catch (err) {
                                alert('导入失败：' + err.message);
                            }
                        };
                        reader.readAsText(file);
                    }
                };
                input.click();
            };

            if (loading) {
                return (
                    <div className="min-h-screen bg-gradient-to-br from-orange-50 to-amber-100 flex items-center justify-center">
                        <div className="text-center">
                            <i className="fas fa-spinner fa-spin text-4xl text-orange-500 mb-4"></i>
                            <p className="text-gray-600">加载中...</p>
                        </div>
                    </div>
                );
            }

            const renderPage = () => {
                if (page === 'home') {
                    return (
                        <HomePage
                            page={page}
                            setPage={setPage}
                            setSelectedRecipe={setSelectedRecipe}
                            selectedCategory={selectedCategory}
                            setSelectedCategory={setSelectedCategory}
                            selectedFlavor={selectedFlavor}
                            setSelectedFlavor={setSelectedFlavor}
                            selectedIngredient={selectedIngredient}
                            setSelectedIngredient={setSelectedIngredient}
                            showCategoryFilter={showCategoryFilter}
                            setShowCategoryFilter={setShowCategoryFilter}
                            showFlavorFilter={showFlavorFilter}
                            setShowFlavorFilter={setShowFlavorFilter}
                            showIngredientFilter={showIngredientFilter}
                            setShowIngredientFilter={setShowIngredientFilter}
                            filteredRecipes={filteredRecipes}
                            setFilteredRecipes={setFilteredRecipes}
                            recipes={recipes}
                            searchQuery={searchQuery}
                            setSearchQuery={setSearchQuery}
                            config={appConfig}
                            loadData={loadData}
                            currentUser={currentUser}
                            setShowMealTypePicker={setShowMealTypePicker}
                            setRecipeToAdd={setRecipeToAdd}
                            toggleFavorite={toggleFavorite}
                            isFavorited={isFavorited}
                        />
                    );
                }
                if (page === 'add') {
                    return <AddRecipePage page={page} setPage={setPage} onBack={() => setPage('home')} config={appConfig} loadData={loadData} />;
                }
                if (page === 'edit') {
                    return <AddRecipePage page={page} setPage={setPage} onBack={() => { setPage('detail'); setEditingRecipe(null); }} config={appConfig} loadData={loadData} editingRecipe={editingRecipe} />;
                }
                if (page === 'detail') {
                    return <RecipeDetailPage page={page} recipe={selectedRecipe} onBack={() => setPage('home')} loadData={loadData} setPage={setPage} setEditingRecipe={setEditingRecipe} />;
                }
                if (page === 'config') {
                    return (
                        <ConfigPage
                            config={appConfig}
                            setConfig={saveConfig}
                            onBack={() => setPage('home')}
                            exportConfig={exportConfig}
                            importConfig={importConfig}
                            exportData={exportData}
                            importData={importData}
                            loadData={loadData}
                        />
                    );
                }
                if (page === 'login') {
                    return <LoginPage onBack={() => setPage('home')} onLogin={(user) => { setCurrentUser(user); localStorage.setItem('currentUser', JSON.stringify(user)); setPage('my'); }} />;
                }
                if (page === 'my') {
                    if (!currentUser) { setPage('login'); return null; }
                    return <MyPage user={currentUser} recipes={recipes} onBack={() => setPage('home')} onLogout={() => { setCurrentUser(null); localStorage.removeItem('currentUser'); setPage('home'); }} selectedDate={selectedDate} setSelectedDate={setSelectedDate} setMenuToEdit={(menu) => { setMenuToEdit(menu); setPage('menuEdit'); }} setPage={setPage} />;
                }
                if (page === 'menuEdit') {
                    if (!currentUser) return null;
                    return <MenuEditPage page={page} setPage={setPage} user={currentUser} menu={menuToEdit} selectedDate={selectedDate} recipes={recipes} onBack={() => { setMenuToEdit(null); setPage('my'); }} loadData={loadData} />;
                }
                if (page === 'stats') {
                    if (!currentUser) return null;
                    return <StatsPage user={currentUser} onBack={() => setPage('my')} />;
                }
                if (page === 'favorites') {
                    return (
                        <FavoritesPage
                            page={page}
                            setPage={setPage}
                            setSelectedRecipe={setSelectedRecipe}
                            selectedCategory={selectedCategory}
                            setSelectedCategory={setSelectedCategory}
                            selectedFlavor={selectedFlavor}
                            setSelectedFlavor={setSelectedFlavor}
                            selectedIngredient={selectedIngredient}
                            setSelectedIngredient={setSelectedIngredient}
                            showCategoryFilter={showCategoryFilter}
                            setShowCategoryFilter={setShowCategoryFilter}
                            showFlavorFilter={showFlavorFilter}
                            setShowFlavorFilter={setShowFlavorFilter}
                            showIngredientFilter={showIngredientFilter}
                            setShowIngredientFilter={setShowIngredientFilter}
                            favorites={favorites}
                            setFavorites={setFavorites}
                            favoriteIds={favoriteIds}
                            setFavoriteIds={setFavoriteIds}
                            searchQuery={searchQuery}
                            setSearchQuery={setSearchQuery}
                            config={appConfig}
                            currentUser={currentUser}
                            toggleFavorite={toggleFavorite}
                            isFavorited={isFavorited}
                        />
                    );
                }
                return null;
            };

            return (
                <>
                    {renderPage()}
                    <button
                        onClick={() => setPage('add')}
                        className="fixed right-4 bottom-20 w-14 h-14 bg-orange-500 text-white rounded-full shadow-lg flex items-center justify-center hover:bg-orange-600 transition z-40"
                    >
                        <i className="fas fa-plus text-xl"></i>
                    </button>

                    <nav className="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 shadow-lg z-50">
                        <div className="flex items-center justify-around py-2">
                            <button
                                onClick={() => setPage('home')}
                                className={`flex flex-col items-center gap-1 px-4 py-2 rounded-lg transition ${page === 'home' ? 'text-orange-500' : 'text-gray-500 hover:text-gray-700'}`}
                            >
                                <i className="fas fa-home text-xl"></i>
                                <span className="text-xs font-medium">首页</span>
                            </button>
                            <button
                                onClick={() => {
                                    if (!currentUser) {
                                        setPage('login');
                                    } else {
                                        setPage('favorites');
                                    }
                                }}
                                className={`flex flex-col items-center gap-1 px-4 py-2 rounded-lg transition ${page === 'favorites' ? 'text-orange-500' : 'text-gray-500 hover:text-gray-700'}`}
                            >
                                <i className="fas fa-heart text-xl"></i>
                                <span className="text-xs font-medium">收藏</span>
                            </button>
                            <button
                                onClick={() => setPage('add')}
                                className="flex flex-col items-center gap-1 px-4 py-2 transition"
                            >
                                <div className="w-12 h-12 bg-orange-500 rounded-full flex items-center justify-center -mt-4 shadow-lg">
                                    <i className="fas fa-plus text-white text-xl"></i>
                                </div>
                            </button>
                            <button
                                onClick={() => setPage('config')}
                                className={`flex flex-col items-center gap-1 px-4 py-2 rounded-lg transition ${page === 'config' ? 'text-orange-500' : 'text-gray-500 hover:text-gray-700'}`}
                            >
                                <i className="fas fa-cog text-xl"></i>
                                <span className="text-xs font-medium">设置</span>
                            </button>
                            <button
                                onClick={() => setPage('my')}
                                className={`flex flex-col items-center gap-1 px-4 py-2 rounded-lg transition ${page === 'my' || page === 'login' || page === 'menuEdit' || page === 'stats' ? 'text-orange-500' : 'text-gray-500 hover:text-gray-700'}`}
                            >
                                <i className="fas fa-user text-xl"></i>
                                <span className="text-xs font-medium">我的</span>
                            </button>
                        </div>
                    </nav>

                    {showMealTypePicker && (
                        <div className="fixed inset-0 bg-black/50 z-50 flex items-end justify-center" onClick={() => { setShowMealTypePicker(false); setRecipeToAdd(null); }}>
                            <div className="bg-white w-full max-w-sm rounded-t-2xl p-6 animate-slide-up" onClick={(e) => e.stopPropagation()}>
                                <div className="flex items-center justify-between mb-4">
                                    <h3 className="font-semibold text-gray-800 text-lg">选择餐类型</h3>
                                    <button onClick={() => { setShowMealTypePicker(false); setRecipeToAdd(null); }} className="p-1 hover:bg-gray-100 rounded-full">
                                        <i className="fas fa-times text-gray-400"></i>
                                    </button>
                                </div>
                                <p className="text-sm text-gray-500 mb-4">{recipeToAdd?.name}</p>
                                <div className="space-y-3">
                                    {[
                                        { key: 'breakfast', label: '早餐', icon: 'fa-sun', color: 'yellow' },
                                        { key: 'lunch', label: '午餐', icon: 'fa-cloud-sun', color: 'orange' },
                                        { key: 'dinner', label: '晚餐', icon: 'fa-moon', color: 'blue' },
                                        { key: 'midnight', label: '夜宵', icon: 'fa-star', color: 'purple' }
                                    ].map(item => (
                                        <label key={item.key} className="flex items-center gap-3 p-3 border-2 rounded-xl cursor-pointer hover:bg-gray-50 transition">
                                            <input
                                                type="radio"
                                                name="mealType"
                                                value={item.key}
                                                checked={selectedMealType === item.key}
                                                onChange={() => setSelectedMealType(item.key)}
                                                className="hidden"
                                            />
                                            <span className={`w-6 h-6 rounded-full border-2 flex items-center justify-center transition ${selectedMealType === item.key ? `border-${item.color}-500 bg-${item.color}-500` : 'border-gray-300'}`}>
                                                {selectedMealType === item.key && <i className="fas fa-check text-white text-xs"></i>}
                                            </span>
                                            <i className={`fas ${item.icon} text-xl ${selectedMealType === item.key ? `text-${item.color}-500` : 'text-gray-300'}`}></i>
                                            <span className={`font-medium ${selectedMealType === item.key ? `text-${item.color}-600` : 'text-gray-600'}`}>{item.label}</span>
                                        </label>
                                    ))}
                                </div>
                                <button
                                    onClick={handleAddToMenu}
                                    className="mt-5 w-full py-3 bg-green-500 text-white rounded-xl font-semibold hover:bg-green-600 transition"
                                >
                                    确认加入
                                </button>
                            </div>
                        </div>
                    )}
                </>
            );
        };

        const HomePage = ({

                    setSteps([]);

                    setVideoFile(null);

                    setImageFile(file);
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        setImagePreview(e.target.result);
                    };
                    reader.readAsDataURL(file);

                    setVideoFile(file);
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        setVideoPreview(e.target.result);
                    };
                    reader.readAsDataURL(file);
                }

                setImageFile(null);
                setImagePreview('');
            };

            const removeVideo = () => {
                setVideoFile(null);
                setVideoPreview('');
            };

            const addIngredient = () => {
                if (!newIngredient.trim()) return;
                const ing = config.ingredients.find(i => i.name === newIngredient);
                setIngredients([...ingredients, { name: newIngredient.trim(), icon: ing?.icon || 'fa-circle' }]);
                setNewIngredient('');
            };

            const removeIngredient = (index) => {
                setIngredients(ingredients.filter((_, i) => i !== index));
            };

            const addStep = () => {
                if (!newStep.trim()) return;
                setSteps([...steps, { description: newStep.trim(), image: '' }]);
                setStepImages([...stepImages, null]);
                setNewStep('');
            };

            const removeStep = (index) => {
                setSteps(steps.filter((_, i) => i !== index));
                const newStepImages = [...stepImages];
                newStepImages.splice(index, 1);
                setStepImages(newStepImages);
            };

            const handleStepImageUpload = (index, file) => {
                if (file && file.type.startsWith('image/')) {
                    const newStepImages = [...stepImages];
                    newStepImages[index] = file;
                    setStepImages(newStepImages);

                    const reader = new FileReader();
                    reader.onload = (e) => {
                        const newSteps = [...steps];
                        newSteps[index].image = e.target.result;
                        setSteps(newSteps);
                    };
                    reader.readAsDataURL(file);

                const newSteps = [...steps];

                console.log('ingredients:', ingredients);
                console.log('steps:', steps);
                console.log('ingredients JSON:', JSON.stringify(ingredients));
                console.log('steps JSON:', JSON.stringify(steps));

                const formData = new FormData();

                formData.append('servings', servings);
                formData.append('cookingMethod', cookingMethod);
                formData.append('description', description);

                formData.append('ingredients', JSON.stringify(ingredients));
                formData.append('steps', JSON.stringify(steps));

                if (imageFile) {
                    formData.append('image', imageFile);
                }

                if (videoFile) {
                    formData.append('video', videoFile);
                }

                for (let i = 0; i < stepImages.length; i++) {
                    if (stepImages[i]) {
                        formData.append(`step_${i}`, stepImages[i]);
                    }
                }

                try {
                    let response;
                    if (editingRecipe) {
                        formData.append('id', editingRecipe.id);

                    } else {
                        response = await api.upload('/recipes', formData);

                    console.log('后端响应:', response);

        const MyPage = ({ user, onBack, onLogout, selectedDate, setSelectedDate, setMenuToEdit, setPage, recipes }) => {
            const [menus, setMenus] = useState([]);
            const [loading, setLoading] = useState(true);
            const [expandedItems, setExpandedItems] = useState({});
            const [calendarMonth, setCalendarMonth] = useState(() => {
                const d = new Date(selectedDate);
                return d.getMonth();
            });
            const [calendarYear, setCalendarYear] = useState(() => {
                const d = new Date(selectedDate);
                return d.getFullYear();
            });

            const toggleExpand = (itemId) => {
                setExpandedItems(prev => ({ ...prev, [itemId]: !prev[itemId] }));
            };

            const getRecipeDetails = (recipeId) => {
                if (!recipes) return null;
                return recipes.find(r => r.id === recipeId);
            };

            const getIngredientIcon = (ing) => {
                if (ing && ing.icon) return ing.icon;
                return 'fa-circle';
            };

            const renderIcon = (icon, className = '') => {
                if (icon && icon.startsWith('custom:')) {
                    const imageUrl = icon.substring(7);
                    return <img src={imageUrl} alt="icon" className={`w-4 h-4 object-contain ${className}`} />;
                }
                return <i className={`fas ${icon} ${className}`}></i>;
            };

            useEffect(() => {
                loadMenus();
            }, [selectedDate]);

            const loadMenus = async () => {
                try {
                    setLoading(true);
                    const res = await api.get(`/menus/${user.id}/menus?date=${selectedDate}`);
                    if (res.success) {
                        setMenus(res.data);
                    }
                } catch (error) {
                    console.error('加载菜单失败:', error);
                }
                setLoading(false);
            };

            const getDaysInMonth = (year, month) => new Date(year, month + 1, 0).getDate();
            const getFirstDayOfMonth = (year, month) => new Date(year, month, 1).getDay();

            const hasMenuOnDate = (dateStr) => {
                return menus.some(m => m.menu_date === dateStr);
            };

            const renderCalendar = () => {
                const daysInMonth = getDaysInMonth(calendarYear, calendarMonth);
                const firstDay = getFirstDayOfMonth(calendarYear, calendarMonth);
                const days = [];
                const today = new Date().toISOString().split('T')[0];

                for (let i = 0; i < firstDay; i++) {
                    days.push(<div key={`empty-${i}`} className="w-10 h-10"></div>);
                }

                for (let d = 1; d <= daysInMonth; d++) {
                    const dateStr = `${calendarYear}-${String(calendarMonth + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
                    const isSelected = dateStr === selectedDate;
                    const isToday = dateStr === today;
                    const hasMenu = hasMenuOnDate(dateStr);

                    days.push(
                        <div key={d} className="flex flex-col items-center">
                            <button
                                onClick={() => setSelectedDate(dateStr)}
                                className={`w-10 h-10 rounded-full flex items-center justify-center text-sm relative transition
                            ${isSelected ? 'bg-orange-500 text-white' : isToday ? 'bg-orange-100 text-orange-600 font-bold' : 'text-gray-700 hover:bg-gray-100'}`}
                            >

            if (!data || data.length === 0) return <p className="text-gray-400 text-center py-4">暂无数据</p>;

            const colors = {
                orange: '#f97316',
                blue: '#3b82f6',
                green: '#22c55e',
                yellow: '#eab308',
                purple: '#a855f7'
            };
            const lineColor = colors[color] || colors.orange;

            const width = 320, height = 160, padding = 30;
            const chartWidth = width - padding * 2, chartHeight = height - padding * 2;

            const maxVal = Math.max(...data.map(d => d.value), 1);
            const minVal = Math.min(...data.map(d => d.value), 0);
            const range = maxVal - minVal || 1;

            const points = data.map((d, i) => ({
                x: padding + (data.length > 1 ? (i / (data.length - 1)) * chartWidth : chartWidth / 2),
                y: padding + chartHeight - ((d.value - minVal) / range) * chartHeight
            }));

            const pathD = points.map((p, i) => `${i === 0 ? 'M' : 'L'} ${p.x} ${p.y}`).join(' ');
            const areaD = pathD + ` L ${points[points.length - 1].x} ${padding + chartHeight} L ${points[0].x} ${padding + chartHeight} Z`;

            const yTicks = 4;
            const yLabels = Array.from({ length: yTicks + 1 }, (_, i) => minVal + (range * i) / yTicks);

            return (
                <div className="bg-white rounded-xl shadow-md p-4">
                    <h3 className="font-semibold text-gray-800 mb-3">{title}</h3>
                    <svg viewBox={`0 0 ${width} ${height}`} className="w-full" style={{ maxWidth: '100%' }}>
                        {yLabels.map((val, i) => (
                            <g key={i}>
                                <line x1={padding} y1={padding + chartHeight - (i / yTicks) * chartHeight} x2={padding + chartWidth} y2={padding + chartHeight - (i / yTicks) * chartHeight} stroke="#e5e7eb" strokeDasharray="2,2" />
                                <text x={padding - 4} y={padding + chartHeight - (i / yTicks) * chartHeight + 4} textAnchor="end" fontSize="9" fill="#9ca3af">{Math.round(val)}</text>
                            </g>
                        ))}
                        {data.length > 0 && (
                            <g>

                                            d.setDate(d.getDate() - 1);
                                            setSelectedDate(d.toISOString().split('T')[0]);
                                        }} className="p-2 hover:bg-gray-100 rounded-full"><i className="fas fa-chevron-left"></i></button>
                                        <span className="font-semibold text-gray-800">{selectedDate}</span>
                                        <button onClick={() => {
                                            const d = new Date(selectedDate);
                                            d.setDate(d.getDate() + 1);
                                            setSelectedDate(d.toISOString().split('T')[0]);
                                        }} className="p-2 hover:bg-gray-100 rounded-full"><i className="fas fa-chevron-right"></i></button>
                                    </div>
                                </div>
                                {renderDailyView()}
                            </>
                        )}
                        {activeTab === 'weekly' && renderWeeklyView()}
                        {activeTab === 'monthly' && renderMonthlyView()}
                        {activeTab === 'yearly' && renderYearlyView()}

                        <div className="bg-white rounded-xl shadow-md p-4">
                            <h3 className="font-semibold text-gray-800 mb-3 flex items-center gap-2"><i className="fas fa-heartbeat text-red-500"></i>健康建议</h3>
                            <div className="space-y-2 text-sm text-gray-600">
                                <p>🥗 建议每日摄入蔬菜 300-500g，水果 200-350g</p>
                                <p>🍖 蛋白质摄入建议: 每公斤体重 1-1.2g</p>
                                <p>💧 每日饮水量建议: 1500-1700ml</p>
                                <p>⚖️ 三餐热量分配: 早餐30% · 午餐40% · 晚餐30%</p>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>

</html>
